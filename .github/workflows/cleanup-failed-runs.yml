name: Cleanup Failed Runs

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Delete failed runs older than N days'
        required: false
        default: '7'

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete failed workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          DAYS=${{ github.event.inputs.days || '7' }}
          CUTOFF=$(date -d "-${DAYS} days" -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Deleting failed runs older than $CUTOFF..."

          DELETED=0
          gh run list --status failure --limit 200 --json databaseId,createdAt --jq \
            ".[] | select(.createdAt < \"$CUTOFF\") | .databaseId" | while read -r ID; do
            echo "Deleting run $ID..."
            gh run delete "$ID" && DELETED=$((DELETED + 1))
          done

          echo "Done. Deleted $DELETED failed run(s)."
