name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IS_DEPENDABOT_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Create .env from secrets
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $envContent = '${{ secrets.ENV_FILE }}'
          if ($envContent) {
            Set-Content -Path '.env' -Value $envContent -NoNewline
          }

      - name: Build
        run: npm run build

      - name: Skip packaging for Dependabot PRs
        if: env.IS_DEPENDABOT_PR == 'true'
        run: echo "Skipping Windows packaging for Dependabot pull requests."

      - name: Cache CPU VLM runtime files
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/cache@v5
        with:
          path: resources/vlm
          key: vlm-runtime-b9484-cuda-12.4-v1

      - name: Prepare CPU VLM runtime files
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/vlm

          $headers = @{ 'User-Agent' = 'curl/8.19.0' }
          $progressPreference = 'SilentlyContinue'
          $retryCount = 3
          $runtimeVersion = "b9484-cuda-12.4"
          $runtimeVersionPath = "resources/vlm/.llama-cpp-runtime-version"

          function Save-WithRetry($Url, $Path, $TimeoutSec) {
            $fileName = Split-Path $Path -Leaf
            $tmpPath = "$Path.download"
            for ($i = 0; $i -lt $retryCount; $i++) {
              try {
                Remove-Item $tmpPath -Force -ErrorAction SilentlyContinue
                Invoke-WebRequest -Uri $Url -Headers $headers -UseBasicParsing -TimeoutSec $TimeoutSec -OutFile $tmpPath -ErrorAction Stop
                Move-Item $tmpPath $Path -Force
                $downloadedSize = (Get-Item $Path).Length
                Write-Host "Downloaded: $fileName ($downloadedSize bytes)"
                return
              } catch {
                Remove-Item $tmpPath -Force -ErrorAction SilentlyContinue
                Write-Host "Download attempt $($i+1) failed for $fileName : $_"
                if ($i -lt ($retryCount - 1)) { Start-Sleep -Seconds 10 }
              }
            }
            throw "Failed to download $fileName after $retryCount attempts"
          }

          $runtimeFiles = @(
            "llama-server.exe",
            "llama-server-impl.dll",
            "llama.dll",
            "llama-common.dll",
            "mtmd.dll",
            "ggml.dll",
            "ggml-base.dll",
            "ggml-rpc.dll",
            "ggml-cpu-x64.dll",
            "libomp140.x86_64.dll"
          )
          $missingRuntimeFiles = @($runtimeFiles | Where-Object { -not (Test-Path "resources/vlm/$_") })
          $hasCurrentRuntime = (Test-Path $runtimeVersionPath) -and ((Get-Content $runtimeVersionPath -Raw).Trim() -eq $runtimeVersion)
          if (($missingRuntimeFiles.Count -gt 0) -or (-not $hasCurrentRuntime)) {
            Write-Host "Missing VLM runtime files from cache/source: $($missingRuntimeFiles -join ', ')"
            if (-not $hasCurrentRuntime) {
              Write-Host "VLM runtime marker is missing or stale. Expected: $runtimeVersion"
            }
            Write-Host "Downloading llama-server runtime..."
            $llamaUrl = "https://github.com/ggml-org/llama.cpp/releases/download/b9484/llama-b9484-bin-win-cuda-12.4-x64.zip"
            $llamaZip = "resources/vlm/llama-b9484-bin-win-cuda-12.4-x64.zip"

            Save-WithRetry $llamaUrl $llamaZip 300

            Write-Host "Extracting llama-server runtime..."
            Expand-Archive -Path $llamaZip -DestinationPath resources/vlm -Force
            Set-Content -Path $runtimeVersionPath -Value $runtimeVersion -NoNewline
            Remove-Item $llamaZip -Force -ErrorAction SilentlyContinue
          } else {
            Write-Host "CPU VLM runtime files already present."
          }

          Write-Host "Prepared CPU VLM runtime files:"
          Get-ChildItem resources/vlm | Where-Object { $_.Extension -in '.exe', '.dll' } | Format-Table Name, Length

      - name: Package
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $env:ELECTRON_MIRROR = "https://npmmirror.com/mirrors/electron/"
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            Write-Host "Package attempt $i of $maxAttempts..."
            npm run package:ci
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Package succeeded on attempt $i"
              break
            }
            if ($i -lt $maxAttempts) {
              Write-Host "Package failed, retrying in 30 seconds..."
              Start-Sleep -Seconds 30
            } else {
              Write-Host "Package failed after $maxAttempts attempts"
              exit 1
            }
          }

      - name: Verify portable package VLM resources
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $portableZip = Get-ChildItem -Path dist-electron -Filter *.zip | Select-Object -First 1
          if (-not $portableZip) {
            Write-Host "ERROR: No portable zip found in dist-electron"
            exit 1
          }

          $listing = 7z l $portableZip.FullName
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $modelFiles = @("Qwen3.5-4B-Q4_K_M.gguf", "mmproj-BF16.gguf")
          foreach ($f in $modelFiles) {
            if ($listing -match [regex]::Escape($f)) {
              Write-Host "ERROR: Portable app package must not include VLM model file: $f"
              exit 1
            }
          }

          $cudaOnlyFiles = @("cudart64_12.dll", "cublas64_12.dll", "cublasLt64_12.dll", "ggml-cuda.dll")
          foreach ($f in $cudaOnlyFiles) {
            if ($listing -match [regex]::Escape($f)) {
              Write-Host "ERROR: Portable app package must not include CUDA-only runtime file (shipped via vlm-models.zip): $f"
              exit 1
            }
          }

          $runtimeFiles = @("llama-server.exe", "llama-server-impl.dll", "llama.dll", "llama-common.dll", "mtmd.dll", "ggml.dll", "ggml-base.dll", "ggml-cpu-x64.dll", "libomp140.x86_64.dll")
          foreach ($f in $runtimeFiles) {
            if (-not ($listing -match [regex]::Escape($f))) {
              Write-Host "ERROR: Portable app package must include VLM runtime file: $f"
              exit 1
            }
          }

          Write-Host "Portable package includes CPU-only VLM runtime, excludes CUDA-only DLLs and model files: $($portableZip.Name)"

      - name: Upload portable zip
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist-electron/*.zip

  vlm-models:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/vlm-models.yml

  release:
    needs: [build, vlm-models]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-portable
          path: ./artifacts/app

      - name: Download model artifact
        uses: actions/download-artifact@v8
        with:
          name: vlm-models
          path: ./artifacts/models

      - name: Create GitHub Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          files: |
            ./artifacts/app/*.zip
            ./artifacts/models/*.zip
          generate_release_notes: true
