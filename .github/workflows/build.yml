name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IS_DEPENDABOT_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Create .env from secrets
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $envContent = '${{ secrets.ENV_FILE }}'
          if ($envContent) {
            Set-Content -Path '.env' -Value $envContent -NoNewline
          }

      - name: Cache VLM model files
        if: env.IS_DEPENDABOT_PR != 'true'
        id: cache-vlm
        uses: actions/cache@v5
        with:
          path: resources/vlm
          key: vlm-qwen35-sompoa-mtp-q4km-hauhaucs-mmproj-b9484-sha256-v1

      - name: Prepare VLM model files
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/vlm

          $headers = @{ 'User-Agent' = 'curl/8.19.0' }
          $progressPreference = 'SilentlyContinue'
          $retryCount = 3
          $runtimeVersion = "b9484-cuda-12.4"
          $runtimeVersionPath = "resources/vlm/.llama-cpp-runtime-version"

          function Save-WithRetry($Url, $Path, $TimeoutSec) {
            $fileName = Split-Path $Path -Leaf
            $tmpPath = "$Path.download"
            for ($i = 0; $i -lt $retryCount; $i++) {
              try {
                Remove-Item $tmpPath -Force -ErrorAction SilentlyContinue
                Invoke-WebRequest -Uri $Url -Headers $headers -UseBasicParsing -TimeoutSec $TimeoutSec -OutFile $tmpPath -ErrorAction Stop
                Move-Item $tmpPath $Path -Force
                $downloadedSize = (Get-Item $Path).Length
                Write-Host "Downloaded: $fileName ($downloadedSize bytes)"
                return
              } catch {
                Remove-Item $tmpPath -Force -ErrorAction SilentlyContinue
                Write-Host "Download attempt $($i+1) failed for $fileName : $_"
                if ($i -lt ($retryCount - 1)) { Start-Sleep -Seconds 10 }
              }
            }
            throw "Failed to download $fileName after $retryCount attempts"
          }

          $runtimeFiles = @(
            "llama-server.exe",
            "llama-server-impl.dll",
            "llama.dll",
            "llama-common.dll",
            "mtmd.dll",
            "ggml.dll",
            "ggml-base.dll",
            "ggml-rpc.dll",
            "ggml-cpu-x64.dll",
            "libomp140.x86_64.dll",
            "cudart64_12.dll",
            "cublas64_12.dll",
            "cublasLt64_12.dll",
            "ggml-cuda.dll"
          )
          $missingRuntimeFiles = @($runtimeFiles | Where-Object { -not (Test-Path "resources/vlm/$_") })
          $hasCurrentRuntime = (Test-Path $runtimeVersionPath) -and ((Get-Content $runtimeVersionPath -Raw).Trim() -eq $runtimeVersion)
          if (($missingRuntimeFiles.Count -gt 0) -or (-not $hasCurrentRuntime)) {
            Write-Host "Missing VLM runtime files from cache/source: $($missingRuntimeFiles -join ', ')"
            if (-not $hasCurrentRuntime) {
              Write-Host "VLM runtime marker is missing or stale. Expected: $runtimeVersion"
            }
            Write-Host "Downloading llama-server (CUDA build)..."
            $llamaUrl = "https://github.com/ggml-org/llama.cpp/releases/download/b9484/llama-b9484-bin-win-cuda-12.4-x64.zip"
            $cudartUrl = "https://github.com/ggml-org/llama.cpp/releases/download/b9484/cudart-llama-bin-win-cuda-12.4-x64.zip"
            $llamaZip = "resources/vlm/llama-b9484-bin-win-cuda-12.4-x64.zip"
            $cudartZip = "resources/vlm/cudart-llama-bin-win-cuda-12.4-x64.zip"

            Save-WithRetry $llamaUrl $llamaZip 300
            Save-WithRetry $cudartUrl $cudartZip 300

            Write-Host "Extracting llama-server runtime..."
            Expand-Archive -Path $llamaZip -DestinationPath resources/vlm -Force
            Expand-Archive -Path $cudartZip -DestinationPath resources/vlm -Force
            Set-Content -Path $runtimeVersionPath -Value $runtimeVersion -NoNewline
            Remove-Item $llamaZip, $cudartZip -Force -ErrorAction SilentlyContinue
          } else {
            Write-Host "VLM runtime files already present in cache/source."
          }

          $modelUrl = "https://huggingface.co/aLKHoEbI/Qwen3.5-4B-SOMPOA-heresy-v2-MTP-Q4_K_M-GGUF/resolve/main/qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf"
          $modelPath = "resources/vlm/qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf"
          if (-not (Test-Path $modelPath)) {
            Write-Host "Downloading qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf (~2.71 GB)..."
            Save-WithRetry $modelUrl $modelPath 600
          } else {
            Write-Host "qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf already present, skipping download."
          }

          $mmprojUrl = "https://huggingface.co/HauhauCS/Qwen3.5-9B-Uncensored-HauhauCS-Aggressive/resolve/main/mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf"
          $mmprojPath = "resources/vlm/mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf"
          if (-not (Test-Path $mmprojPath)) {
            Write-Host "Downloading mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf (~922 MB)..."
            Save-WithRetry $mmprojUrl $mmprojPath 300
          } else {
            Write-Host "mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf already present, skipping download."
          }

          Write-Host "Prepared VLM files:"
          Get-ChildItem resources/vlm | Where-Object { $_.Extension -in '.exe', '.dll', '.gguf' } | Format-Table Name, Length

      - name: Verify VLM model file hashes
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $expectedModelSha256 = "11072ba67c42d3309ca0634654492666b2ccb12de238677aeb34ca566e612696"
          $expectedMmprojSha256 = "05f662501f8bd45607b079723a3e238a4e888fd085a10a53f4057a0e250f6934"

          function Assert-FileSha256($Path, $Expected) {
            $actual = (Get-FileHash -Algorithm SHA256 -Path $Path).Hash.ToLowerInvariant()
            if ($actual -ne $Expected) {
              throw "SHA256 mismatch for $Path. Expected $Expected, got $actual"
            }
          }

          Assert-FileSha256 "resources/vlm/qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf" $expectedModelSha256
          Assert-FileSha256 "resources/vlm/mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf" $expectedMmprojSha256

      - name: Build
        run: npm run build

      - name: Skip packaging for Dependabot PRs
        if: env.IS_DEPENDABOT_PR == 'true'
        run: echo "Skipping VLM download and Windows packaging for Dependabot pull requests."

      - name: Package
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $env:ELECTRON_MIRROR = "https://npmmirror.com/mirrors/electron/"
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            Write-Host "Package attempt $i of $maxAttempts..."
            npm run package
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Package succeeded on attempt $i"
              break
            }
            if ($i -lt $maxAttempts) {
              Write-Host "Package failed, retrying in 30 seconds..."
              Start-Sleep -Seconds 30
            } else {
              Write-Host "Package failed after $maxAttempts attempts"
              exit 1
            }
          }

      - name: Verify portable package VLM resources
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $portableZip = Get-ChildItem -Path dist-electron -Filter *.zip | Select-Object -First 1
          if (-not $portableZip) {
            Write-Host "ERROR: No portable zip found in dist-electron"
            exit 1
          }

          $listing = 7z l $portableZip.FullName
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $modelFiles = @("qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf", "mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf")
          foreach ($f in $modelFiles) {
            if ($listing -match [regex]::Escape($f)) {
              Write-Host "ERROR: Portable app package must not include VLM model file: $f"
              exit 1
            }
          }

          $cudaOnlyFiles = @("cudart64_12.dll", "cublas64_12.dll", "cublasLt64_12.dll", "ggml-cuda.dll")
          foreach ($f in $cudaOnlyFiles) {
            if ($listing -match [regex]::Escape($f)) {
              Write-Host "ERROR: Portable app package must not include CUDA-only runtime file (shipped via vlm-models.zip): $f"
              exit 1
            }
          }

          $runtimeFiles = @("llama-server.exe", "llama-server-impl.dll", "llama.dll", "llama-common.dll", "mtmd.dll", "ggml.dll", "ggml-base.dll", "ggml-cpu-x64.dll", "libomp140.x86_64.dll")
          foreach ($f in $runtimeFiles) {
            if (-not ($listing -match [regex]::Escape($f))) {
              Write-Host "ERROR: Portable app package must include VLM runtime file: $f"
              exit 1
            }
          }

          Write-Host "Portable package includes CPU-only VLM runtime, excludes CUDA-only DLLs and model files: $($portableZip.Name)"

      - name: Create VLM model package
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $modelReadme = @"
          VLM 模型 + CUDA 运行时 — 解压说明
          ====================================

          本压缩包包含视觉语言模型文件与 GPU 加速所需的 CUDA 运行时：
            - qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf                      (主模型 ~2.71 GB)
            - mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf        (视觉编码器 ~922 MB)
            - cudart64_12.dll            (CUDA Runtime)
            - cublas64_12.dll            (cuBLAS)
            - cublasLt64_12.dll          (cuBLASLt)
            - ggml-cuda.dll              (llama.cpp CUDA backend)

          llama-server.exe、llama-server-impl.dll 与 CPU 通用 runtime DLL 已随 Windows portable 应用包发布。
          仅当需要 GPU 加速时才需要解压本包；CPU 推理只需扩展 .gguf 模型文件。

          解压位置
          --------
          将压缩包内所有文件解压到应用程序的 resources\vlm\ 目录下。

          完整路径应类似：
            <应用安装目录>\resources\vlm\qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf
            <应用安装目录>\resources\vlm\mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf
            <应用安装目录>\resources\vlm\ggml-cuda.dll

          Windows portable 应用包会预置 resources\vlm 目录和 CPU 运行时文件。

          验证
          ----
          解压后启动应用，右上角 "VLM 实时数据" 面板状态应从 "等待连接" 变为 "VLM 在线"。
          "@

          New-Item -ItemType Directory -Force -Path dist-models

          $modelFiles = @("qwen3.5-4b-sompoa-heresy-v2-mtp-q4_k_m.gguf", "mmproj-Qwen3.5-9B-Uncensored-HauhauCS-Aggressive-BF16.gguf")
          $cudaFiles = @("cudart64_12.dll", "cublas64_12.dll", "cublasLt64_12.dll", "ggml-cuda.dll")
          $allRequiredFiles = $modelFiles + $cudaFiles

          $missingFiles = @()
          foreach ($f in $allRequiredFiles) {
            $path = "resources/vlm\$f"
            if (-not (Test-Path $path)) {
              Write-Host "Missing: $path"
              $missingFiles += $f
            } else {
              Write-Host "Found: $path ($(Get-Item $path).Length) bytes"
            }
          }

          if ($missingFiles.Count -gt 0) {
            Write-Host "ERROR: Missing required VLM files: $($missingFiles -join ', ')"
            exit 1
          }

          Write-Host "Copying required files to dist-models..."
          foreach ($f in $allRequiredFiles) {
            Copy-Item "resources/vlm\$f" -Destination "dist-models/" -Force
          }
          Set-Content -Path "dist-models/README-解压说明.txt" -Value $modelReadme -Encoding UTF8

          Write-Host "Creating vlm-models.zip..."
          $filesToZip = ($allRequiredFiles | ForEach-Object { "dist-models/$_" }) + @("dist-models/README-解压说明.txt")
          7z a -tzip "dist-models/vlm-models.zip" $filesToZip

          Write-Host "Cleaning up intermediate files..."
          foreach ($f in ($allRequiredFiles + @("README-解压说明.txt"))) {
            Remove-Item "dist-models/$f" -Force -ErrorAction SilentlyContinue
          }

          $zipPath = "dist-models/vlm-models.zip"
          if (Test-Path $zipPath) {
            $zipSize = (Get-Item $zipPath).Length
            Write-Host "Model package created: $zipPath ($([Math]::Round($zipSize/1MB, 2)) MB)"
          } else {
            Write-Host "ERROR: Failed to create model package"
            exit 1
          }

      - name: Upload portable zip
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist-electron/*.zip

      - name: Upload VLM model package
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: vlm-models
          path: dist-models/vlm-models.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-portable
          path: ./artifacts/app

      - name: Download model artifact
        uses: actions/download-artifact@v8
        with:
          name: vlm-models
          path: ./artifacts/models

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./artifacts/app/*.zip
            ./artifacts/models/*.zip
          generate_release_notes: true
