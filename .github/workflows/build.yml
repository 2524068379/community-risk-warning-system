name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IS_DEPENDABOT_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Create .env from secrets
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $envContent = '${{ secrets.ENV_FILE }}'
          if ($envContent) {
            Set-Content -Path '.env' -Value $envContent -NoNewline
          }

      - name: Cache VLM model files
        if: env.IS_DEPENDABOT_PR != 'true'
        id: cache-vlm
        uses: actions/cache@v5
        with:
          path: resources/vlm
          key: vlm-jackrong-qwen3.5-4b-q4km-mmproj-sha256-v1

      - name: Download VLM model files
        if: env.IS_DEPENDABOT_PR != 'true' && steps.cache-vlm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/vlm

          $headers = @{ 'User-Agent' = 'curl/8.19.0' }
          $progressPreference = 'SilentlyContinue'

          Write-Host "Downloading llama-server (CUDA build)..."
          $llamaUrl = "https://github.com/ggml-org/llama.cpp/releases/download/b8864/llama-b8864-bin-win-cuda-12.4-x64.zip"
          $cudartUrl = "https://github.com/ggml-org/llama.cpp/releases/download/b8864/cudart-llama-bin-win-cuda-12.4-x64.zip"

          $retryCount = 3
          foreach ($url in @($llamaUrl, $cudartUrl)) {
            $fileName = Split-Path $url -Leaf
            $success = $false
            for ($i = 0; $i -lt $retryCount; $i++) {
              try {
                $response = Invoke-WebRequest -Uri $url -Headers $headers -UseBasicParsing -TimeoutSec 300 -ErrorAction Stop
                [System.IO.File]::WriteAllBytes("resources/vlm/$fileName", $response.Content)
                Write-Host "Downloaded: $fileName ($(($response.Content).Length) bytes)"
                $success = $true
                break
              } catch {
                Write-Host "Download attempt $($i+1) failed for $fileName : $_"
                if ($i -lt ($retryCount - 1)) { Start-Sleep -Seconds 5 }
              }
            }
            if (-not $success) { throw "Failed to download $fileName after $retryCount attempts" }
          }

          Write-Host "Extracting llama-server..."
          Expand-Archive -Path resources/vlm/llama-b8864-bin-win-cuda-12.4-x64.zip -DestinationPath resources/vlm -Force
          Expand-Archive -Path resources/vlm/cudart-llama-bin-win-cuda-12.4-x64.zip -DestinationPath resources/vlm -Force

          Remove-Item resources/vlm/llama-b8864-bin-win-cuda-12.4-x64.zip, resources/vlm/cudart-llama-bin-win-cuda-12.4-x64.zip -Force -ErrorAction SilentlyContinue

          Write-Host "Downloading Qwen3.5-4B.Q4_K_M.gguf (~2.55 GB)..."
          $modelUrl = "https://huggingface.co/Jackrong/Qwen3.5-4B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF/resolve/main/Qwen3.5-4B.Q4_K_M.gguf"
          for ($i = 0; $i -lt $retryCount; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $modelUrl -Headers $headers -UseBasicParsing -TimeoutSec 600 -ErrorAction Stop
              [System.IO.File]::WriteAllBytes("resources/vlm/Qwen3.5-4B.Q4_K_M.gguf", $response.Content)
              Write-Host "Model downloaded ($(($response.Content).Length) bytes)"
              break
            } catch {
              Write-Host "Download attempt $($i+1) failed: $_"
              if ($i -lt ($retryCount - 1)) { Start-Sleep -Seconds 10 }
              else { throw "Failed to download model after $retryCount attempts" }
            }
          }

          Write-Host "Downloading mmproj-BF16.gguf (~644 MB)..."
          $mmprojUrl = "https://huggingface.co/Jackrong/Qwen3.5-4B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF/resolve/main/mmproj-BF16.gguf"
          for ($i = 0; $i -lt $retryCount; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $mmprojUrl -Headers $headers -UseBasicParsing -TimeoutSec 300 -ErrorAction Stop
              [System.IO.File]::WriteAllBytes("resources/vlm/mmproj-BF16.gguf", $response.Content)
              Write-Host "mmproj downloaded ($(($response.Content).Length) bytes)"
              break
            } catch {
              Write-Host "Download attempt $($i+1) failed: $_"
              if ($i -lt ($retryCount - 1)) { Start-Sleep -Seconds 10 }
              else { throw "Failed to download mmproj after $retryCount attempts" }
            }
          }

          Write-Host "VLM files downloaded:"
          Get-ChildItem resources/vlm | Where-Object { $_.Extension -in '.exe', '.dll', '.gguf' } | Format-Table Name, Length

      - name: Verify VLM model file hashes
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $expectedModelSha256 = "de8cf2454c46ec34e6b991dc11f5dd42d543926272d8a59d36ceb5a2eaf7962a"
          $expectedMmprojSha256 = "32c003c4247825cd765bd882c0c2d3b3b071f4f909aa00f9e1d6404ba2422cf0"

          function Assert-FileSha256($Path, $Expected) {
            $actual = (Get-FileHash -Algorithm SHA256 -Path $Path).Hash.ToLowerInvariant()
            if ($actual -ne $Expected) {
              throw "SHA256 mismatch for $Path. Expected $Expected, got $actual"
            }
          }

          Assert-FileSha256 "resources/vlm/Qwen3.5-4B.Q4_K_M.gguf" $expectedModelSha256
          Assert-FileSha256 "resources/vlm/mmproj-BF16.gguf" $expectedMmprojSha256

      - name: Build
        run: npm run build

      - name: Skip packaging for Dependabot PRs
        if: env.IS_DEPENDABOT_PR == 'true'
        run: echo "Skipping VLM download and Windows packaging for Dependabot pull requests."

      - name: Package
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $env:ELECTRON_MIRROR = "https://npmmirror.com/mirrors/electron/"
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            Write-Host "Package attempt $i of $maxAttempts..."
            npm run package
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Package succeeded on attempt $i"
              break
            }
            if ($i -lt $maxAttempts) {
              Write-Host "Package failed, retrying in 30 seconds..."
              Start-Sleep -Seconds 30
            } else {
              Write-Host "Package failed after $maxAttempts attempts"
              exit 1
            }
          }

      - name: Verify portable package excludes VLM model files
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $portableZip = Get-ChildItem -Path dist-electron -Filter *.zip | Select-Object -First 1
          if (-not $portableZip) {
            Write-Host "ERROR: No portable zip found in dist-electron"
            exit 1
          }

          $listing = 7z l $portableZip.FullName
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $modelFiles = @("Qwen3.5-4B.Q4_K_M.gguf", "mmproj-BF16.gguf")
          foreach ($f in $modelFiles) {
            if ($listing -match [regex]::Escape($f)) {
              Write-Host "ERROR: Portable app package must not include VLM model file: $f"
              exit 1
            }
          }

          Write-Host "Portable package excludes VLM model files: $($portableZip.Name)"

      - name: Create VLM model package
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $modelReadme = @"
          VLM 模型文件 — 解压说明
          ========================

          本压缩包包含视觉语言模型文件：
            - Qwen3.5-4B.Q4_K_M.gguf   (主模型 ~2.55 GB)
            - mmproj-BF16.gguf           (视觉编码器 ~644 MB)
            - llama-server.exe            (CUDA 推理服务器)
            - ggml-cuda.dll, cublas*.dll  (CUDA 依赖库)

          解压位置
          --------
          将压缩包内所有文件解压到应用程序的 resources\vlm\ 目录下。

          完整路径应类似：
            <应用安装目录>\resources\vlm\llama-server.exe
            <应用安装目录>\resources\vlm\Qwen3.5-4B.Q4_K_M.gguf
            <应用安装目录>\resources\vlm\mmproj-BF16.gguf

          如果 resources\vlm 目录不存在，请手动创建。

          验证
          ----
          解压后启动应用，右上角 "VLM 实时数据" 面板状态应从 "等待连接" 变为 "VLM 在线"。
          "@

          New-Item -ItemType Directory -Force -Path dist-models

          $vlmFiles = @("Qwen3.5-4B.Q4_K_M.gguf", "mmproj-BF16.gguf", "llama-server.exe")
          $supportingFiles = @("ggml-cuda.dll", "cublas64_12.dll", "cublasLt64_12.dll", "cudart64_12.dll", "llama.dll", "ggml.dll", "ggml-base.dll", "llama-common.dll", "libomp140.x86_64.dll")
          $allRequiredFiles = $vlmFiles + $supportingFiles

          $missingFiles = @()
          foreach ($f in $allRequiredFiles) {
            $path = "resources/vlm\$f"
            if (-not (Test-Path $path)) {
              Write-Host "Missing: $path"
              $missingFiles += $f
            } else {
              Write-Host "Found: $path ($(Get-Item $path).Length) bytes"
            }
          }

          if ($missingFiles.Count -gt 0) {
            Write-Host "ERROR: Missing required VLM files: $($missingFiles -join ', ')"
            exit 1
          }

          Write-Host "Copying required files to dist-models..."
          foreach ($f in $allRequiredFiles) {
            Copy-Item "resources/vlm\$f" -Destination "dist-models/" -Force
          }
          Set-Content -Path "dist-models/README-解压说明.txt" -Value $modelReadme -Encoding UTF8

          Write-Host "Creating vlm-models.zip..."
          $filesToZip = @("dist-models/Qwen3.5-4B.Q4_K_M.gguf", "dist-models/mmproj-BF16.gguf", "dist-models/llama-server.exe") + ($supportingFiles | ForEach-Object { "dist-models/$_" }) + @("dist-models/README-解压说明.txt")
          7z a -tzip "dist-models/vlm-models.zip" $filesToZip

          Write-Host "Cleaning up intermediate files..."
          foreach ($f in ($allRequiredFiles + @("README-解压说明.txt"))) {
            Remove-Item "dist-models/$f" -Force -ErrorAction SilentlyContinue
          }

          $zipPath = "dist-models/vlm-models.zip"
          if (Test-Path $zipPath) {
            $zipSize = (Get-Item $zipPath).Length
            Write-Host "Model package created: $zipPath ($([Math]::Round($zipSize/1MB, 2)) MB)"
          } else {
            Write-Host "ERROR: Failed to create model package"
            exit 1
          }

      - name: Upload portable zip
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist-electron/*.zip

      - name: Upload VLM model package
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: vlm-models
          path: dist-models/vlm-models.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-portable
          path: ./artifacts/app

      - name: Download model artifact
        uses: actions/download-artifact@v8
        with:
          name: vlm-models
          path: ./artifacts/models

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./artifacts/app/*.zip
            ./artifacts/models/*.zip
          generate_release_notes: true
